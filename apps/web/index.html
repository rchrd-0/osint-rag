<!doctype html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>osint-rag</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: JetBrains Mono, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
      background: #09090b;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #09090b;
      color: #fafafa;
    }

    body {
      min-height: 100vh;
    }

    #app-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #18181b 0%, #09090b 55%);
      transition: opacity 180ms ease;
    }

    #app-loader.is-hidden {
      opacity: 0;
      pointer-events: none;
    }

    .app-loader__content {
      display: grid;
      justify-items: center;
      gap: 0.875rem;
      padding: 1.5rem;
    }

    .app-loader__spinner {
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 9999px;
      border: 3px solid rgba(250, 250, 250, 0.14);
      border-top-color: #fafafa;
      animation: app-loader-spin 0.8s linear infinite;
    }

    .app-loader__label {
      color: rgba(250, 250, 250, 0.8);
      font-size: 0.95rem;
      letter-spacing: 0.01em;
    }

    @keyframes app-loader-spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div id="app-loader" aria-live="polite" aria-label="Loading application" role="status">
    <div class="app-loader__content">
      <div class="app-loader__spinner" aria-hidden="true"></div>
      <div class="app-loader__label">Loading osint-rag...</div>
    </div>
  </div>
  <div id="app"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
